name: Arbitex CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ── Unit tests ──────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Run API unit tests
        run: pnpm --filter @arbitex/api test:coverage
        env:
          BITGET_API_KEY: test
          BITGET_API_SECRET: test
          BITGET_PASSPHRASE: test
          HUGGINGFACE_API_TOKEN: test
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test
          SUPABASE_SERVICE_ROLE_KEY: test

      - name: Run Web unit tests
        run: pnpm --filter @arbitex/web test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: |
            apps/api/coverage/coverage-final.json
            apps/web/coverage/coverage-final.json
          fail_ci_if_error: false

  # ── Build check ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test

  # ── E2E tests ───────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @arbitex/e2e exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @arbitex/e2e test
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL || 'http://localhost:3000' }}
          E2E_API_URL: ${{ secrets.E2E_API_URL || 'http://localhost:4000' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
